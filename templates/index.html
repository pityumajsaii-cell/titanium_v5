<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIUM | Enterprise AI & Security</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --dark: #050505; --card-bg: #111111; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--dark); color: var(--text); overflow-x: hidden; }
        nav { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--primary); }
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .hero h1 { font-size: 3.5rem; margin-bottom: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px 8%; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        .price { font-size: 3rem; font-weight: 800; margin: 20px 0; }
        .btn-pay { background: var(--text); color: #000; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: 800; display: block; margin-top: 20px; }
        .contact-section { padding: 80px 8%; background: #080808; text-align: center; }
        form { max-width: 500px; margin: 30px auto; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { background: #111; border: 1px solid #333; padding: 12px; color: white; border-radius: 5px; }
        .btn-submit { background: var(--secondary); color: white; border: none; padding: 15px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <nav><div class="logo">TITANIUM <span>V5.5</span></div></nav>
    <section class="hero">
        <h1>Automated Security</h1>
        <p style="color:#888;">Grok AI Powered Protection</p>
    </section>
    <div class="grid">
        {% for product in products %}
        <div class="card">
            <h3 style="color:{{ product.color }}">{{ product.name }}</h3>
            <div class="price">€{{ product.price }}</div>
            <a href="{{ product.payment_url }}" class="btn-pay">Aktiválás</a>
        </div>
        {% endfor %}
    </div>
    <section id="contact" class="contact-section">
        <h2>AI Konzultáció</h2>
        <form action="/lead" method="post">
            <input type="text" name="name" placeholder="Név" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" rows="4" placeholder="Üzenet" required></textarea>
            <button type="submit" class="btn-submit">Küldés</button>
        </form>
    </section>
</body>
</html>
