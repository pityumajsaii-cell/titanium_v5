name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  force_push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://pityumajsaii-cell:$HF_TOKEN@huggingface.co/spaces/pityumajsaii-cell/titanium-nexus main
