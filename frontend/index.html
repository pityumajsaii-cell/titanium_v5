<!DOCTYPE html>
<html>
<head>
<title>Titanium AI SaaS</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}
.box{
background:#1e293b;
padding:30px;
border-radius:12px;
max-width:700px;
margin:auto;
}
button{
padding:15px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:18px;
cursor:pointer;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}
</style>
</head>
<body>

<div class="box">
<h1>Titanium AI Automation</h1>

<p>AI SaaS Automation Platform</p>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<button onclick="sendLead()">
Start AI Automation
</button>

<p id="result"></p>

</div>

<script>
async function sendLead(){

const res = await fetch("http://127.0.0.1:8000/lead",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:document.getElementById("name").value,
email:document.getElementById("email").value,
service:"AI Automation"
})
})

const data = await res.json()

document.getElementById("result").innerHTML =
"Lead Created: " + data.lead_id
}
</script>

</body>
</html>
